name: Build & Publish Wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Find OpenSSL (debug)
        if: runner.os == 'Windows'
        run: |
          echo "=== Searching for libcrypto-3-x64.dll ==="
          Get-ChildItem -Path "C:\" -Filter "libcrypto-3-x64.dll" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { echo $_.FullName }

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          OPENSSL_ROOT_DIR: ${{ runner.os == 'Windows' && 'C:\Program Files\OpenSSL' || '' }}

      - name: Inspect built wheel (debug)
        if: runner.os == 'Windows'
        run: |
          pip install pefile
          python -c "
          import zipfile, pefile, sys, os
          for whl in os.listdir('wheelhouse'):
              if not whl.endswith('.whl'): continue
              print(f'=== {whl} ===')
              with zipfile.ZipFile(f'wheelhouse/{whl}') as z:
                  for name in z.namelist():
                      if name.endswith('.dll'):
                          print(f'  Found: {name}')
                          z.extract(name, 'tmp_inspect')
                          pe = pefile.PE(f'tmp_inspect/{name}')
                          if hasattr(pe, 'DIRECTORY_ENTRY_IMPORT'):
                              for entry in pe.DIRECTORY_ENTRY_IMPORT:
                                  print(f'    imports: {entry.dll.decode()}')
                          else:
                              print('    no imports found')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
