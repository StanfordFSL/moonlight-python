name: Build & Publish Wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Find OpenSSL (debug)
        if: runner.os == 'Windows'
        run: |
          dir "C:\Program Files\OpenSSL"
          dir "C:\Program Files\OpenSSL\include"
          dir "C:\Program Files\OpenSSL\lib"
          dir "C:\Program Files\OpenSSL\bin"
          echo "OPENSSL_ROOT_DIR=$env:OPENSSL_ROOT_DIR"

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          OPENSSL_ROOT_DIR: ${{ runner.os == 'Windows' && 'C:\Program Files\OpenSSL' || '' }}

      - name: Inspect built wheel (debug)
        if: runner.os == 'Windows'
        run: |
          pip install delvewheel machomachomangler
          Get-ChildItem wheelhouse\*.whl | ForEach-Object {
            echo "=== $($_.Name) ==="
            delvewheel needed $_.FullName
          }

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
