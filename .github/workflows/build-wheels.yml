name: Build & Publish Wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU for aarch64 emulation
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64 aarch64
          OPENSSL_ROOT_DIR: ${{ runner.os == 'Windows' && 'C:\Program Files\OpenSSL' || '' }}

      - name: Inspect built wheel (debug)
        if: runner.os == 'Windows'
        run: |
          pip install pefile
          python -c "
          import zipfile, pefile, sys, os, shutil, tempfile
          for whl in sorted(os.listdir('wheelhouse')):
              if not whl.endswith('.whl'): continue
              print(f'=== {whl} ===')
              tmp = tempfile.mkdtemp()
              try:
                  with zipfile.ZipFile(f'wheelhouse/{whl}') as z:
                      for name in z.namelist():
                          if name.endswith('.dll'):
                              print(f'  Found: {name}')
                              z.extract(name, tmp)
                              pe = pefile.PE(os.path.join(tmp, name))
                              if hasattr(pe, 'DIRECTORY_ENTRY_IMPORT'):
                                  for entry in pe.DIRECTORY_ENTRY_IMPORT:
                                      print(f'    imports: {entry.dll.decode()}')
                              else:
                                  print('    no imports found')
                              pe.close()
              finally:
                  shutil.rmtree(tmp, ignore_errors=True)
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
